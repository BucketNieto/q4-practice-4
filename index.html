<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4practice4</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-image:url(https://i.pinimg.com/736x/ef/b3/09/efb309584d11dbed37f97ef401a50fa2.jpg);
        }
    </style>
</head>
<body>

    <form>
        <h2 style="color: aliceblue;">Log in form</h2>
        <label for="name" style="color: aliceblue;">Username:</label>
        <br>
        <input type="text" id="name" class="form-control" placeholder="Enter here" required>
            <br>

            <label for="pwd" style="color: aliceblue;">Password:</label>
        <br>
        <input type="password" id="pwd" class="form-control" placeholder="Enter here" required>
            <br>

            <input type="button" name="button" id="loginBTN" value="Login" class="btn btn-info rounded-5" onclick="authenticate()">
    </form>

    <script>
        Let attempt_counter = 0;
        function authenticate(){
            let username = document.getElementById("name").value;
            let pwd = document.getElementById("pwd").value;
            let granted = "Welcome " + username + "!";
            let denied = "Access denied. Account locked after 3 attempts!";

            while (attempt_counter < 3) {
        if (username === "kylarlovespc69" && pwd === "longing") {
            alert(granted);
            attempt_counter = 0; 
            document.getElementById("display").innerHTML = "";
            window.location.href = "dashboard.html";

            break;
        } else {
            attempt_counter++;
            document.getElementById("display").innerHTML =
                "Incorrect username and/or password. Attempt " + attempt_counter + " of 3 ";
            break; // stop loop for this click
        }
        }
        if (attempt_counter >= 3) {
                alert(denied);
                document.getElementById("loginBTN").disabled = true; // disable button
            }
        }

        
    </script>
    
</body>
</html>
